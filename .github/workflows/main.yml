name: CI-CD Pipeline

on:
  push:
    branches:
      - main

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Login to DockerHub
        run: echo "${{ secrets.DOCKER_PASSWORD }}" | docker login -u "${{ secrets.DOCKER_USERNAME }}" --password-stdin

      - name: Build Docker Image
        run: docker build -t ${{ secrets.DOCKER_USERNAME }}/insurance-app .

      - name: Push Docker Image
        run: docker push ${{ secrets.DOCKER_USERNAME }}/insurance-app

      - name: Deploy to EC2
        uses: appleboy/ssh-action@v0.1.10
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_KEY }}
          script: |
            docker pull ${{ secrets.DOCKER_USERNAME }}/insurance-app
            docker stop insurance-container || true
            docker rm insurance-container || true
            docker ps -q --filter "publish=8000" | xargs -r docker stop
            docker run -d -p 8000:8000 --name insurance-container ${{ secrets.DOCKER_USERNAME }}/insurance-app